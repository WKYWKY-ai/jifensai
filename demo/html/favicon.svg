<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#f5f5f5"/>
  
  <!-- Pole -->
  <rect x="45" y="60" width="10" height="35" fill="#8b7355"/>
  <rect x="46" y="61" width="8" height="33" fill="#a08060"/>
  
  <!-- Top sign -->
  <rect x="15" y="15" width="70" height="20" rx="3" fill="#ffffff" stroke="#333" stroke-width="2"/>
  <text x="50" y="28" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#333">TECH</text>
  
  <!-- Bottom sign -->
  <rect x="10" y="40" width="80" height="18" rx="3" fill="#ffffff" stroke="#333" stroke-width="2"/>
  <text x="50" y="52" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#333">LIBERAL ARTS</text>
  
  <!-- Decorative lines -->
  <line x1="10" y1="55" x2="90" y2="55" stroke="#ddd" stroke-width="1"/>
</svg>