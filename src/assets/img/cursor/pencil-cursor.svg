<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Apple Pencil body -->
  <rect x="12" y="2" width="8" height="26" rx="2" fill="#1a1a1a"/>
  
  <!-- Pencil tip -->
  <polygon points="14,28 16,31 18,28" fill="#666"/>
  <polygon points="15,28 16,30 17,28" fill="#999"/>
  
  <!-- Cap -->
  <rect x="12" y="2" width="8" height="4" rx="1" fill="#f5c518"/>
  
  <!-- Apple logo -->
  <circle cx="16" cy="16" r="2" fill="#fff"/>
  
  <!-- Highlight -->
  <rect x="13" y="6" width="1" height="16" fill="rgba(255,255,255,0.2)"/>
  
  <!-- Shadow -->
  <rect x="19" y="6" width="1" height="16" fill="rgba(0,0,0,0.3)"/>
</svg>